<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma de Cursos e Trilhas</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-logo">📚</div>
    <h1>Plataforma de Cursos e Trilhas</h1>
    <p>Knapsack PD + Maior Subsequência Crescente</p>
  </header>

  <!-- LAYOUT PRINCIPAL -->
  <div class="container">

    <!-- COLUNA ESQUERDA: Formulário + Lista -->
    <div style="display:flex; flex-direction:column; gap:16px;">

      <!-- Formulário de cadastro -->
      <div class="card">
        <div class="card-header">
          <div class="icon-label icon-azul">➕</div>
          <h2>Adicionar curso</h2>
        </div>
        <div class="card-body">
          <form id="formCurso" autocomplete="off">
            <div class="form-group">
              <label for="inputNome">Nome do curso</label>
              <input type="text" id="inputNome" placeholder="Ex: Python Básico" maxlength="60">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="inputGanho">Ganho de conhecimento</label>
                <input type="number" id="inputGanho" placeholder="1 – 10" min="1" max="99">
              </div>
              <div class="form-group">
                <label for="inputHoras">Duração (horas)</label>
                <input type="number" id="inputHoras" placeholder="Ex: 4" min="1" max="999">
              </div>
            </div>
            <div class="form-group">
              <label for="inputNivel">Nível de dificuldade (1 = fácil, 10 = avançado)</label>
              <input type="number" id="inputNivel" placeholder="1 – 10" min="1" max="10">
            </div>
            <button type="submit" class="btn btn-primario">Adicionar curso</button>
          </form>
        </div>
      </div>

      <!-- Lista de cursos cadastrados -->
      <div class="card">
        <div class="card-header">
          <div class="icon-label icon-ambar">📋</div>
          <h2>Cursos cadastrados</h2>
          <span class="badge" id="contadorCursos">0</span>
        </div>
        <div class="card-body">
          <div class="lista-cursos" id="listaCursos">
            <!-- Preenchido via JS -->
          </div>
        </div>
      </div>

      <!-- Limite de horas + Botão gerar -->
      <div class="card">
        <div class="card-header">
          <div class="icon-label icon-ambar">⏱️</div>
          <h2>Limite de horas disponíveis</h2>
        </div>
        <div class="limite-section">
          <div class="limite-row">
            <div class="form-group">
              <label for="inputLimite">Total de horas</label>
              <input type="number" id="inputLimite" placeholder="Ex: 15" min="1" max="9999" value="15">
            </div>
          </div>
        </div>
        <div style="padding: 0 20px 20px;">
          <button class="btn btn-gerar" id="btnGerar">
            ⚡ Gerar recomendação
          </button>
        </div>
      </div>

    </div>

    <!-- COLUNA DIREITA: Resultado -->
    <div class="card" style="min-height: 400px;">
      <div class="card-header">
        <div class="icon-label icon-verde">✨</div>
        <h2>Resultado</h2>
      </div>
      <div class="card-body">
        <div id="areaResultado">
          <div class="resultado-placeholder">
            <div class="icone-grande">🎯</div>
            <p>Cadastre os cursos e clique em <strong>"Gerar recomendação"</strong> para ver a seleção otimizada e a trilha de aprendizado.</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Toast de notificação -->
  <div class="toast" id="toast"></div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
